<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Rompecabezas</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-size">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Features</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Pricing</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link disabled"
                href="#"
                tabindex="-1"
                aria-disabled="true"
                >Disabled</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section>
      <div class="layer middle-layer">
        <div class="container-center">
          <img
            class="cuadricula"
            src="../img/Cuadricula.png"
            alt="cuadricula"
            id="marcoMadera"
          />
          <div class="img-container" id="mi-div">
            <img
              class="elephant-size"
              src="../img/Elefante.jpg"
              alt="Imagen de fondo"
            />
          </div>
        </div>
      </div>
      <section id="pieces">
        <img
          id="letraA"
          class="piezasElefante"
          src="../img/Elefante/A.png"
          alt="elephant-a"
        />
        <img
          id="letraB"
          class="piezasElefante"
          src="../img/Elefante/B.png"
          alt="elephant-b"
        />
        <img
          id="letraC"
          class="piezasElefante"
          src="../img/Elefante/C.png"
          alt="elephant-c"
        />
        <img
          id="letraD"
          class="piezasElefante"
          src="../img/Elefante/D.png"
          alt="elephant-d"
        />
      </section>
    </section>
    <section class="sound-switch me-3">
      <div class="form-check form-switch">
        <label class="form-check-label text-light" for="flexSwitchCheckChecked"
          >Activar/Desactivar Sonido de victoria</label
        >
        <input
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="Activar"
          checked
        />
      </div>
    </section>
    <audio id="win" src="../sound/Elephant.mp3"></audio>
    <script type="module" src="main.js"></script>
  </body>
</html>
