<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Rompecabezas</title>
  </head>
  <body class="container">
    <section>
      <div class="layer middle-layer">
        <div class="container-center">
          <img
            class="cuadricula"
            src="../img/Cuadricula.png"
            alt="cuadricula"
          />
          <div class="img-container">
            <img
              class="elephant-size"
              src="../img/Elefante.jpg"
              alt="Imagen de fondo"
            />
          </div>
        </div>
      </div>
      <section class="pieces-size">
        <img id="0" class="movil" src="../img/A.png" alt="elephant-a" />
        <img id="1" class="movil" src="../img/B.png" alt="elephant-b" />
        <img id="2" class="movil" src="../img/C.png" alt="elephant-c" />
        <img id="3" class="movil" src="../img/D.png" alt="elephant-d" />
      </section>
    </section>
    <audio id="win" src="../sound/Elephant.mp3"></audio>
    <script type="module" src="main.js"></script>
  </body>
</html>
